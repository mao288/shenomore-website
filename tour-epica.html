<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour con Epica 2025 - She No More</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/KjRZ2gzD/Logo-SNM-Emblema-2.png">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-dark: #1a0a1f;
            --purple-deep: #2d1b36;
            --purple-main: #6b2d5b;
            --purple-accent: #9b4d8b;
            --purple-light: #c77dbb;
            --white: #f5f0f5;
            --gray: #a89fa8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: linear-gradient(180deg, var(--purple-dark) 0%, #0d0510 100%);
            color: var(--white);
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--purple-main);
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray);
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: var(--purple-light);
        }
        .back-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
        }

        .header-logo img {
            height: 50px;
            filter: drop-shadow(0 0 15px var(--purple-accent));
        }

        .header-spacer {
            width: 120px;
        }

        .lang-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .lang-btn {
            background: none;
            border: none;
            color: var(--gray);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .lang-btn:hover { color: var(--white); }
        .lang-btn.active { color: var(--purple-light); }

        /* Hero del Tour */
        .tour-hero {
            text-align: center;
            padding: 3rem 2rem;
            border-bottom: 1px solid var(--purple-main);
        }

        .tour-hero h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px var(--purple-accent);
        }

        .tour-hero .tagline {
            color: var(--purple-light);
            font-size: 1.2rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* Grid de flyers de ciudades */
        .dates-section {
            padding: 4rem 2rem;
        }

        .dates-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 0.15em;
            margin-bottom: 2.5rem;
            color: var(--gray);
        }

        .dates-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .date-flyer {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid var(--purple-main);
            transition: all 0.4s ease;
            aspect-ratio: 3/4;
        }

        .date-flyer:hover {
            border-color: var(--purple-light);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(107, 45, 91, 0.5);
        }

        .date-flyer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .date-flyer:hover img {
            transform: scale(1.05);
        }

        .date-flyer-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            background: linear-gradient(to top, rgba(26, 10, 31, 0.98) 0%, rgba(26, 10, 31, 0.8) 60%, transparent 100%);
            text-align: center;
        }

        .date-flyer-city {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            letter-spacing: 0.1em;
            margin-bottom: 0.3rem;
        }

        .date-flyer-date {
            color: var(--purple-light);
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }

        .date-flyer-venue {
            color: var(--gray);
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .gallery-btn {
            display: inline-block;
            padding: 0.6rem 1.5rem;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 2px solid var(--purple-accent);
            border-radius: 50px;
            color: var(--white);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .gallery-btn:hover {
            background: var(--purple-accent);
        }

        /* Video Section */
        .video-section {
            padding: 4rem 2rem;
            background: rgba(45, 27, 54, 0.3);
            text-align: center;
        }

        .video-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.5rem;
            letter-spacing: 0.15em;
            margin-bottom: 2rem;
        }

        .video-container {
            max-width: 800px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid var(--purple-main);
            aspect-ratio: 16/9;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container svg {
            width: 80px;
            height: 80px;
            fill: var(--purple-accent);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .video-container svg:hover {
            fill: var(--purple-light);
            transform: scale(1.1);
        }

        /* Footer */
        .tour-footer {
            padding: 3rem 2rem;
            text-align: center;
            border-top: 1px solid var(--purple-main);
        }

        .back-to-shows {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            border: 2px solid var(--purple-accent);
            border-radius: 50px;
            color: var(--white);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .back-to-shows:hover {
            background: var(--purple-accent);
        }
        .back-to-shows svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .dates-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .tour-hero h1 {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 600px) {
            .dates-grid {
                grid-template-columns: 1fr;
                max-width: 350px;
            }
            .tour-hero h1 {
                font-size: 1.8rem;
            }
            header {
                padding: 1rem;
            }
            .header-spacer {
                display: none;
            }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html#shows" class="back-btn">
            <svg viewBox="0 0 24 24" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            <span data-i18n="nav.back">Volver a Shows</span>
        </a>
        <div class="header-logo">
            <a href="index.html"><img src="https://i.ibb.co/DDhvcFM7/Logo-SNM-Emblema.png" alt="She No More"></a>
        </div>
        <div class="lang-toggle">
            <button class="lang-btn active" data-lang="es">ES</button>
            <span style="color: var(--gray);">|</span>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </header>

    <section class="tour-hero">
        <h1 data-i18n="epica.title">TOUR CON EPICA</h1>
        <p class="tagline" data-i18n="epica.tagline">Mayo 2025 • México</p>
    </section>

    <section class="dates-section">
        <h2 data-i18n="epica.dates">FECHAS DEL TOUR</h2>
        <div class="dates-grid">
            <!-- Monterrey -->
            <div class="date-flyer">
                <img src="https://i.ibb.co/cBRzNDD/EPICA-MTY-FLYER.png" alt="She No More con Epica - Monterrey">
                <div class="date-flyer-overlay">
                    <h3 class="date-flyer-city">Monterrey</h3>
                    <p class="date-flyer-date" data-i18n="epica.mty.date">13 de Mayo 2025</p>
                    <p class="date-flyer-venue">Showcenter</p>
                    <a href="galeria-monterrey.html" class="gallery-btn" data-i18n="btn.gallery">Ver Galería</a>
                </div>
            </div>

            <!-- Puebla -->
            <div class="date-flyer">
                <img src="https://i.ibb.co/60Q43swC/EPICA-PUEBLA-FLYER.png" alt="She No More con Epica - Puebla">
                <div class="date-flyer-overlay">
                    <h3 class="date-flyer-city">Puebla</h3>
                    <p class="date-flyer-date" data-i18n="epica.puebla.date">15 de Mayo 2025</p>
                    <p class="date-flyer-venue">Auditorio Explanada</p>
                    <a href="galeria-puebla.html" class="gallery-btn" data-i18n="btn.gallery">Ver Galería</a>
                </div>
            </div>

            <!-- Guadalajara -->
            <div class="date-flyer">
                <img src="https://i.ibb.co/S48t4RB9/EPICA-GDL-FLYER.png" alt="She No More con Epica - Guadalajara">
                <div class="date-flyer-overlay">
                    <h3 class="date-flyer-city">Guadalajara</h3>
                    <p class="date-flyer-date" data-i18n="epica.gdl.date">25 de Mayo 2025</p>
                    <p class="date-flyer-venue">Teatro Estudio Cabaret</p>
                    <a href="galeria-guadalajara.html" class="gallery-btn" data-i18n="btn.gallery">Ver Galería</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="tour-footer">
        <a href="index.html#shows" class="back-to-shows">
            <svg viewBox="0 0 24 24" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            <span data-i18n="nav.back">Volver a Shows</span>
        </a>
    </footer>

    <script>
        const translations = {
            es: {
                'nav.back': 'Volver a Shows',
                'btn.gallery': 'Ver Galería',
                'epica.title': 'TOUR CON EPICA',
                'epica.tagline': 'Mayo 2025 • México',
                'epica.dates': 'FECHAS DEL TOUR',
                'epica.mty.date': '13 de Mayo 2025',
                'epica.puebla.date': '15 de Mayo 2025',
                'epica.gdl.date': '25 de Mayo 2025'
            },
            en: {
                'nav.back': 'Back to Shows',
                'btn.gallery': 'View Gallery',
                'epica.title': 'TOUR WITH EPICA',
                'epica.tagline': 'May 2025 • Mexico',
                'epica.dates': 'TOUR DATES',
                'epica.mty.date': 'May 13, 2025',
                'epica.puebla.date': 'May 15, 2025',
                'epica.gdl.date': 'May 25, 2025'
            }
        };

        let currentLang = localStorage.getItem('snm_lang') || 'es';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('snm_lang', lang);
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });

            document.querySelectorAll('.gallery-btn').forEach(btn => {
                btn.textContent = translations[lang]['btn.gallery'];
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
        });

        setLanguage(currentLang);
    </script>

</body>
</html>
