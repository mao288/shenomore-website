<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHE NO MORE - Monterrey con Epica 2025</title>
    <link rel="icon" type="image/png" href="https://i.ibb.co/KjRZ2gzD/Logo-SNM-Emblema-2.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/KjRZ2gzD/Logo-SNM-Emblema-2.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-dark: #1a0a1f;
            --purple-deep: #2d1b36;
            --purple-main: #6b2d5b;
            --purple-accent: #9b4d8b;
            --purple-light: #c77dbb;
            --white: #f5f0f5;
            --gray: #a89fa8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: 
                linear-gradient(180deg, rgba(26, 10, 31, 0.9) 0%, rgba(26, 10, 31, 0.85) 50%, rgba(26, 10, 31, 0.9) 100%),
                url('https://i.ibb.co/7dbF2SSy/Wallpaper.png') center/cover no-repeat fixed;
            color: var(--white);
            min-height: 100vh;
        }

        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 1rem 2rem;
            background: linear-gradient(to bottom, rgba(26, 10, 31, 0.98), rgba(26, 10, 31, 0.9));
            backdrop-filter: blur(10px);
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
        }
        .nav-back a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.3s ease;
        }
        .nav-back a:hover { color: var(--purple-light); }
        .nav-back svg { width: 20px; height: 20px; stroke: currentColor; fill: none; }
        .logo-center img {
            height: 50px;
            filter: drop-shadow(0 0 20px var(--purple-accent));
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .lang-toggle {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .lang-btn {
            background: none;
            border: none;
            color: var(--gray);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .lang-btn:hover { color: var(--white); }
        .lang-btn.active {
            color: var(--white);
            background: var(--purple-accent);
        }

        .gallery-hero {
            padding: 8rem 2rem 3rem;
            text-align: center;
        }
        .gallery-hero h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px var(--purple-accent);
        }
        .gallery-hero .date {
            color: var(--purple-light);
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .gallery-hero .venue {
            color: var(--gray);
            font-size: 1rem;
            letter-spacing: 0.1em;
        }

        .gallery-section {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            aspect-ratio: 4/3;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .gallery-item:hover {
            border-color: var(--purple-light);
            box-shadow: 0 10px 30px rgba(107, 45, 91, 0.4);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }
        .lightbox-close {
            position: absolute;
            top: 1.5rem; right: 1.5rem;
            background: none;
            border: none;
            color: var(--white);
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.3s ease;
        }
        .lightbox-close:hover { color: var(--purple-light); }
        .lightbox-close svg { width: 32px; height: 32px; stroke: currentColor; }
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(107, 45, 91, 0.5);
            border: none;
            color: var(--white);
            cursor: pointer;
            padding: 1rem;
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        .lightbox-nav:hover { background: var(--purple-accent); }
        .lightbox-nav svg { width: 24px; height: 24px; stroke: currentColor; fill: none; }
        .lightbox-prev { left: 1.5rem; }
        .lightbox-next { right: 1.5rem; }

        footer {
            padding: 3rem 2rem;
            text-align: center;
            margin-top: 2rem;
        }
        .footer-back {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
            border: 2px solid var(--purple-accent);
            border-radius: 50px;
            color: var(--white);
            transition: all 0.3s ease;
        }
        .footer-back:hover {
            background: var(--purple-accent);
            box-shadow: 0 0 20px rgba(155, 77, 139, 0.5);
        }

        @media (max-width: 768px) {
            header { padding: 0.8rem 1rem; }
            .logo-center img { height: 40px; }
            .nav-back a span { display: none; }
            .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        }
        @media (max-width: 480px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .lightbox-nav { padding: 0.7rem; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="nav-back">
                <a href="tour-epica.html">
                    <svg viewBox="0 0 24 24" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    <span data-i18n="nav.back">Volver a Shows</span>
                </a>
            </div>
            <div class="logo-center">
                <a href="index.html"><img src="https://i.ibb.co/DDhvcFM7/Logo-SNM-Emblema.png" alt="She No More"></a>
            </div>
            <div class="nav-right">
                <div class="lang-toggle">
                    <button class="lang-btn active" data-lang="es">ES</button>
                    <button class="lang-btn" data-lang="en">EN</button>
                </div>
            </div>
        </nav>
    </header>

    <section class="gallery-hero">
        <h1>Monterrey</h1>
        <p class="date" data-i18n="gallery.date">13 de mayo de 2025</p>
        <p class="venue" data-i18n="gallery.venue">Showcenter • Con Epica</p>
    </section>

    <section class="gallery-section">
        <div class="gallery-grid">
            <div class="gallery-item" onclick="openLightbox(0)">
                <img src="https://i.ibb.co/fV244MF7/SNMMonterrey-JPG-02-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(1)">
                <img src="https://i.ibb.co/wZckDhVL/SNMMonterrey-JPG-06-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(2)">
                <img src="https://i.ibb.co/kVTsC55p/SNMMonterrey-JPG-07-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(3)">
                <img src="https://i.ibb.co/nqDzzbG2/SNMMonterrey-JPG-08-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(4)">
                <img src="https://i.ibb.co/BVdQGdWx/SNMMonterrey-JPG-13-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(5)">
                <img src="https://i.ibb.co/zhYvmqry/SNMMonterrey-JPG-14-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(6)">
                <img src="https://i.ibb.co/tp3n3Fd7/SNMMonterrey-JPG-20-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(7)">
                <img src="https://i.ibb.co/JjjGxrnm/SNMMonterrey-JPG-23-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(8)">
                <img src="https://i.ibb.co/pBpnpprG/SNMMonterrey-JPG-25-web.jpg" alt="She No More en Monterrey">
            </div>
            <div class="gallery-item" onclick="openLightbox(9)">
                <img src="https://i.ibb.co/Vp3Cvqhw/SNMMonterrey-JPG-36-web.jpg" alt="She No More en Monterrey">
            </div>
        </div>
    </section>

    <footer>
        <a href="tour-epica.html" class="footer-back" data-i18n="nav.backbtn">Volver a Shows</a>
    </footer>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <button class="lightbox-nav lightbox-prev" onclick="changeImage(-1)">
            <svg viewBox="0 0 24 24" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <img src="" alt="She No More en Monterrey" id="lightbox-img">
        <button class="lightbox-nav lightbox-next" onclick="changeImage(1)">
            <svg viewBox="0 0 24 24" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>
    </div>

    <script>
        const images = [
            'https://i.ibb.co/fV244MF7/SNMMonterrey-JPG-02-web.jpg',
            'https://i.ibb.co/wZckDhVL/SNMMonterrey-JPG-06-web.jpg',
            'https://i.ibb.co/kVTsC55p/SNMMonterrey-JPG-07-web.jpg',
            'https://i.ibb.co/nqDzzbG2/SNMMonterrey-JPG-08-web.jpg',
            'https://i.ibb.co/BVdQGdWx/SNMMonterrey-JPG-13-web.jpg',
            'https://i.ibb.co/zhYvmqry/SNMMonterrey-JPG-14-web.jpg',
            'https://i.ibb.co/tp3n3Fd7/SNMMonterrey-JPG-20-web.jpg',
            'https://i.ibb.co/JjjGxrnm/SNMMonterrey-JPG-23-web.jpg',
            'https://i.ibb.co/pBpnpprG/SNMMonterrey-JPG-25-web.jpg',
            'https://i.ibb.co/Vp3Cvqhw/SNMMonterrey-JPG-36-web.jpg'
        ];
        let currentIndex = 0;

        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightbox-img').src = images[currentIndex];
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function changeImage(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = images.length - 1;
            if (currentIndex >= images.length) currentIndex = 0;
            document.getElementById('lightbox-img').src = images[currentIndex];
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') changeImage(-1);
            if (e.key === 'ArrowRight') changeImage(1);
        });

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightbox')) closeLightbox();
        });

        // Sistema de traducción
        const translations = {
            es: {
                'nav.back': 'Volver al Tour',
                'nav.backbtn': 'Volver al Tour',
                'gallery.date': '13 de mayo de 2025',
                'gallery.venue': 'Showcenter • Con Epica'
            },
            en: {
                'nav.back': 'Back to Tour',
                'nav.backbtn': 'Back to Tour',
                'gallery.date': 'May 13, 2025',
                'gallery.venue': 'Showcenter • With Epica'
            }
        };

        let currentLang = localStorage.getItem('snm_lang') || 'es';

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('snm_lang', lang);
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });

            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
        });

        setLanguage(currentLang);
    </script>
</body>
</html>
